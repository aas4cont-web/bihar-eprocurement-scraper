version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bihar_tenders_db
    environment:
      POSTGRES_DB: bihar_tenders
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
